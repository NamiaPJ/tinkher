<!DOCTYPE html>
<html>
<head>
    <title>Nutrition Report</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main-card">

    <div class="top-bar">
        <h2>📊 Your Nutrition Report</h2>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="score-box">
        <h1>{{ overall }}/100</h1>
        <p>Overall Nutrition Score</p>
    </div>

    <div class="recommendation-box">
        <h3>🧠 Personalized Recommendations</h3>
        <ul>
            {% for r in recommendation %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="button-group">
        <a href="/download" class="download-btn">Download PDF</a>
        <a href="/" class="back-btn">Check Again</a>
    </div>

</div>

</body>
</html>
